{% extends "base.html" %}
{% block content %}
<div class="form-admin">
    <h2 style="text-align: center; color: var(--azul-oscuro); margin-bottom: 20px;">Nuevo Producto</h2>
    <form method="POST">
        <label>Nombre del Sticker:</label>
        <input type="text" name="nombre" placeholder="Ej. Pack Gatitos" required>
        
        <label>Descripción Corta:</label>
        <input type="text" name="descripcion" placeholder="Ej. 10 stickers mate">
        
        <label>Precio ($):</label>
        <input type="number" step="0.01" name="precio" placeholder="59.00" required>
        
        <label>Stock inicial:</label>
        <input type="number" name="stock" placeholder="50" required>
        
        <button type="submit" class="btn-agregar" style="width: 100%; padding: 15px; font-size: 1.1rem;">
            Guardar Sticker
        </button>
    </form>
    <p style="text-align: center; margin-top: 20px;"><a href="/" style="color: #666;">Cancelar</a></p>
</div>
{% endblock %}
